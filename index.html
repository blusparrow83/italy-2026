      &lt;div class=&quot;stay&quot;&gt;&lt;b&gt;Tonight:&lt;/b&gt; Carnival Palace, Cannaregio. Maddy&#x27;s Venice Day 2.&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:30a&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Murano &amp;amp; Burano boat trip (booked).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Private-boat small group, ref BR-1414057101. Glassblowing on Murano, lace + rainbow houses on Burano. ~5 hrs, back ~1:30 PM. Headsets included.&lt;/span&gt; &lt;a class=&quot;bk&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Venice/Murano-Glass-and-Burano-Lace-Tour-from-Venice/d522-3731MURANO&quot;&gt;book →&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;1:30p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Lunch: cicchetti crawl.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Maddy&#x27;s picks: Ai Promessi Sposi, Bar Ai Santi, or Cantina Do Spade.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;2:30p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Gelato: Gelatoteca Suso.&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev rest&quot;&gt;&lt;div class=&quot;t&quot;&gt;3:00p&lt;/div&gt;&lt;div class=&quot;dot go&quot;&gt;😴&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Hotel rest through the hot hours.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Non-negotiable today — big evening ahead.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;lnk&quot;&gt;stroll west toward Dorsoduro&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;4:00p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Dorsoduro stroll.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;The arty quarter: Accademia, Peggy Guggenheim, Campo Santa Margherita, then the Zattere promenade facing Giudecca. (Golden hour falls during the food tour tonight.)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;lnk&quot;&gt;walk to Rialto (~15 min)&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;5:15p&lt;/div&gt;&lt;div class=&quot;src p&quot;&gt;P&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Head to the meeting point.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Fountain by the steps of Chiesa San Giacomo di Rialto, steps from the Rialto Bridge.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;5:45p&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;&quot;Eat Like a Local&quot; food &amp;amp; wine tour (booked). This is dinner.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;3 hrs, ref BR-1414061055, $206.84 (2 adults). 8 stops / 15 tastings across Rialto, San Polo, Santa Croce &amp;amp; Cannaregio: coffee + pastries, the oldest bàcaro in Venice, cured meats &amp;amp; cheese, a sit-down pasta/fish dinner (sarde in saor), finishing with gelato at the Rialto Bridge ~8:45p. Flag Elizabeth&#x27;s no-shellfish.&lt;/span&gt; &lt;a class=&quot;bk&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Venice/Experience-Venice-Eat-like-the-locals/d522-9870P9&quot;&gt;book →&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:15p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Gondola at night (optional).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Back canals of Castello, a nightcap on the water.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== DAY 7 ===================== --&gt;
  &lt;div class=&quot;day rome&quot;&gt;
    &lt;div class=&quot;dhead&quot;&gt;&lt;div class=&quot;num&quot;&gt;&lt;b&gt;7&lt;/b&gt;&lt;span&gt;Tue 21&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ht&quot;&gt;&lt;div class=&quot;dl&quot;&gt;Tue, Jul 21 · Venice → Rome&lt;/div&gt;&lt;div class=&quot;dn&quot;&gt;Back to Rome: hidden gems &amp;amp; Trastevere&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;dbody&quot;&gt;
      &lt;div class=&quot;stay&quot;&gt;&lt;b&gt;Tonight:&lt;/b&gt; Singer Palace · Via Alessandro Specchi 10 (by the Pantheon &amp;amp; Piazza Venezia). Maddy&#x27;s Rome Day 3.&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:26p&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Frecciarossa Venezia → Roma Termini.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;~3h45. Lunch on board. (Slow Venice morning + water taxi to the station first.)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;5:25p&lt;/div&gt;&lt;div class=&quot;src p&quot;&gt;P&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Train delayed, in at 5:15. Taxi Termini to the hotel (Singer Palace, by Piazza Venezia), ~10-15 min, ~&amp;euro;12-15. Drop bags, check-in opened at 2 PM.&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;lnk&quot;&gt;walk to the Pantheon area&lt;/div&gt;
      
      &lt;div class=&quot;lnk&quot;&gt;cross the river into Trastevere (~15 min)&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:20p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Piazza del Campidoglio + Roman Forum overlook.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Michelangelo&#x27;s square, then the terrace on Via del Campidoglio for the Forum at golden hour. Free.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:10p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Taxi to Trastevere (hotel is calling it).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Anastasiya at the Singer Palace arranged the car for ~7:10 PM.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:30p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Dinner: Spirito DiVino (CONFIRMED, table for 2).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Via dei Genovesi 31 a/b &amp;middot; +39 06 589 66 89. Ask to see the 80 BC cellar. Slow Food, ancient Roman recipes.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:00p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Optional: Janiculum + Fontanone night panorama.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;15-20 min uphill from dinner. Only if you have the legs, Colosseum is 8:45 AM. Backup: tomorrow ~5:30p before the food tour.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== DAY 8 ===================== --&gt;
  &lt;div class=&quot;day rome&quot;&gt;
    &lt;div class=&quot;dhead&quot;&gt;&lt;div class=&quot;num&quot;&gt;&lt;b&gt;8&lt;/b&gt;&lt;span&gt;Wed 22&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ht&quot;&gt;&lt;div class=&quot;dl&quot;&gt;Wed, Jul 22 · Rome&lt;/div&gt;&lt;div class=&quot;dn&quot;&gt;Colosseum, Monti &amp;amp; a Trastevere feast&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;dbody&quot;&gt;
      &lt;div class=&quot;stay&quot;&gt;&lt;b&gt;Tonight:&lt;/b&gt; Singer Palace. Maddy&#x27;s Rome Day 2 + your booked tours.&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:45a&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Colosseum (Arena or Underground) + Roman Forum.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Viator #1413384135, ~3 hrs. Bring a hat and water — little shade.&lt;/span&gt; &lt;a class=&quot;bk&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://maddysavenue.com/visiting-the-colosseum-rome-italy/&quot;&gt;her tips →&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;10:30a&lt;/div&gt;&lt;div class=&quot;src a&quot;&gt;A&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Arch of Titus.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Inside the Forum, on your tour path — the menorah relief from Jerusalem, 70 AD.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:15p&lt;/div&gt;&lt;div class=&quot;src a&quot;&gt;A&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Mamertine Prison.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;The dungeon tied to Peter &amp;amp; Paul, right by the Forum exit.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;lnk&quot;&gt;5-min uphill walk into Monti&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;1:00p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Lunch: Ai Tre Scalini, in Monti.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Maddy&#x27;s Monti pick — a cozy wine-bar lunch.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;2:15p&lt;/div&gt;&lt;div class=&quot;src a&quot;&gt;A&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;San Pietro in Vincoli.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Michelangelo&#x27;s Moses + St Peter&#x27;s chains (free, ~15 min), in Monti.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;3:00p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Santa Maria Maggiore.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;The Papal Basilica, don&#x27;t miss it.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev rest&quot;&gt;&lt;div class=&quot;t&quot;&gt;4:00p&lt;/div&gt;&lt;div class=&quot;dot go&quot;&gt;😴&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Hotel rest before the evening.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Big food tour tonight — recharge through the heat.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:40p&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Trastevere Evening Food Tour (booked).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Wed Jul 22, 6:40 PM, ~4 hrs (this is dinner). 6-7 stops incl. pizza, a pasta dinner, supplì, porchetta, Fatamorgana gelato + wine. Viator #1413716311, $337.&lt;/span&gt; &lt;a class=&quot;bk&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Rome/Twilight-Trastevere-Food-Tour/d511-5553P13&quot;&gt;book →&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== DAY 9 ===================== --&gt;
  &lt;div class=&quot;day rome&quot;&gt;
    &lt;div class=&quot;dhead&quot;&gt;&lt;div class=&quot;num&quot;&gt;&lt;b&gt;9&lt;/b&gt;&lt;span&gt;Thu 23&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ht&quot;&gt;&lt;div class=&quot;dl&quot;&gt;Thu, Jul 23 · Rome&lt;/div&gt;&lt;div class=&quot;dn&quot;&gt;The Vatican &amp;amp; your anniversary night&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;dbody&quot;&gt;
      &lt;div class=&quot;stay&quot;&gt;&lt;b&gt;Tonight:&lt;/b&gt; Singer Palace. Maddy&#x27;s Rome Day 4.&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:30a&lt;/div&gt;&lt;div class=&quot;src p&quot;&gt;P&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Taxi to the Vatican.&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:00a&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Vatican Museums, Sistine Chapel &amp;amp; St Peter&#x27;s.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Viator #1413258895, ~3-3.5 hrs. Skip-the-line; covered shoulders/knees.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:00p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Lunch off the tourist drag in Prati.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Maddy&#x27;s rule: walk a few blocks from St Peter&#x27;s, never eat at the landmark.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;1:30p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Optional: Roman Catacombs, or a free afternoon.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Early-Christian burial tunnels, or just wander.&lt;/span&gt; &lt;a class=&quot;bk&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://maddysavenue.com/recommends/rome-italy-catacombs-tour/&quot;&gt;catacombs →&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev rest&quot;&gt;&lt;div class=&quot;t&quot;&gt;4:30p&lt;/div&gt;&lt;div class=&quot;dot go&quot;&gt;💛&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Back to the hotel, freshen up for the last night.&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;4:30p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Santa Maria sopra Minerva + Largo di Torre Argentina.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Maddy&#x27;s hidden gem (Michelangelo&#x27;s Christ) and the cat-filled sunken ruins where Caesar fell.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:00p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Aperitivo: Aperol Spritz in your favorite piazza.&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:30p&lt;/div&gt;&lt;div class=&quot;src a&quot;&gt;A&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Anniversary dinner: La Campana.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Your one special night — Rome&#x27;s oldest restaurant (1518), classic Roman cooking, slightly upscale but not stuffy, ~10 min walk from the Singer (near Piazza Navona). Reserve ahead; smart casual.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:30p&lt;/div&gt;&lt;div class=&quot;src a&quot;&gt;A&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Rooftop nightcap on the Singer Palace rooftop terrace.&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== DAY 10 ===================== --&gt;
  &lt;div class=&quot;day home&quot;&gt;
    &lt;div class=&quot;dhead&quot;&gt;&lt;div class=&quot;num&quot;&gt;&lt;b&gt;10&lt;/b&gt;&lt;span&gt;Fri 24&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ht&quot;&gt;&lt;div class=&quot;dl&quot;&gt;Fri, Jul 24 · Fly home&lt;/div&gt;&lt;div class=&quot;dn&quot;&gt;Arrivederci, Roma&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;dbody&quot;&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:15a&lt;/div&gt;&lt;div class=&quot;src p&quot;&gt;P&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Taxi to FCO.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;€50 flat. Early start for the 9:45 flight.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:45a&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;DL215 FCO → ATL.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Seats 41H/41J.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:10p&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;DL3059 ATL → PNS.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Home ~6:25 PM. 🇮🇹&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;foot&quot;&gt;Follow it top to bottom · 🇮🇹 Buon viaggio&lt;/div&gt;
&lt;/div&gt;
