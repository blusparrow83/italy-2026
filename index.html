          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why:&lt;/b&gt; the best-preserved building of ancient Rome and the world&#x27;s largest unreinforced concrete dome, a church since 609.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Hours:&lt;/b&gt; daily 9:00&amp;ndash;19:00 (last entry 18:30).&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Ticket:&lt;/b&gt; ~&amp;euro;5 (buy on the Musei Italiani app/portal to skip the desk). &lt;i&gt;Third-party reports say it may rise to &amp;euro;7 from Jul 1, 2026, verify the live price.&lt;/i&gt; Free during Mass for worshippers.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; active church, cover shoulders &amp;amp; knees. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Pantheon%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;

      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:15 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Taxi: Hotel Lunetta &amp;rarr; Roma Termini &lt;span class=&quot;pill p-book&quot;&gt;LEAVE ~8:15&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;~2.7 km, ~10-15 min, roughly &amp;euro;12-15 (metered). Ask the front desk to call an official white taxi, or use the FreeNow app. Leaving by ~8:15 puts you on the platform by ~8:45 for the 9:10 train.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Best with luggage:&lt;/b&gt; taxi from the hotel door, ~10-15 min to Termini, about &amp;euro;12-15.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Budget backup:&lt;/b&gt; ~5-min walk to Largo di Torre Argentina, then bus 40 or 64 to Termini (~15-20 min, &amp;euro;1.50). Gets packed and is pickpocket-prone with bags, so taxi is the better call on a train morning.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;At Termini:&lt;/b&gt; Frecciarossa 9520, coach 6, seats 2A/2B, PNR JEEEUN. QR ticket in the Trenitalia app; be on the platform ~15 min early.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/dir/?api=1&amp;amp;travelmode=driving&amp;amp;origin=Hotel%20Lunetta%2C%20Piazza%20del%20Paradiso%2068%2C%20Roma&amp;amp;destination=Roma%20Termini%2C%20Roma&quot;&gt;driving route to Termini &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:10 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Frecciarossa Roma Termini → Firenze S.M.N. &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Frecciarossa 9520 &amp;middot; arr 10:46 AM &amp;middot; &lt;b&gt;coach 6, seats 2A/2B&lt;/b&gt; &amp;middot; PNR JEEEUN. QR ticket in the Trenitalia app.&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/2/25/Frecciarossa_train_%28Rome%29_in_2023.03.jpg&quot; alt=&quot;Frecciarossa&quot; loading=&quot;lazy&quot;&gt;

      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;2:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Florence in a Day: David, Cathedral &amp;amp; Bell Tower &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Ref BR-1413733843. Meet Piazza San Marco at the Manfredo Fanti monument. Covers Accademia/David, Cathedral, Baptistery/Duomo Museum &amp;amp; the bell-tower climb (~3 hrs).&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Full tour details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://media.tacdn.com/media/attractions-splice-spp-674x446/17/10/8f/56.jpg&quot; alt=&quot;David tour&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Florence in a Day: David, Cathedral &amp;amp; City Highlights&lt;/b&gt; (Walks In Europe). Booked ref BR-1413733843 &amp;middot; Viator 51192P4 &amp;middot; Thu Jul 16, 2:30 PM &amp;middot; ~3 hrs &amp;middot; English &amp;middot; small group (max 15) &amp;middot; headsets.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Overview:&lt;/b&gt; a small-group walk through Florence&#x27;s art &amp;amp; architecture: skip-the-line into the Accademia for Michelangelo&#x27;s David, then Cathedral Square&#x27;s religious sites including the Duomo, with the option to climb Giotto&#x27;s Bell Tower. Depending on timing you visit the Duomo Museum or the Baptistery.&lt;/div&gt;
          &lt;b&gt;What&#x27;s included&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Skip-the-line entry to the Accademia Gallery (David)&lt;/li&gt;
            &lt;li&gt;Cathedral visit (guided on afternoon tours, yours is 2:30)&lt;/li&gt;
            &lt;li&gt;Pre-reserved guided Duomo (Opera del Duomo) Museum&lt;/li&gt;
            &lt;li&gt;Pre-reserved guided Baptistery&lt;/li&gt;
            &lt;li&gt;Pre-reserved Giotto&#x27;s Bell Tower climb (at your leisure)&lt;/li&gt;
            &lt;li&gt;3-hour guided walk of the historic centre, licensed guide + headsets&lt;/li&gt;
          &lt;/ul&gt;
          &lt;b&gt;Itinerary&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Piazza San Marco (pass by)&lt;/li&gt;
            &lt;li&gt;Galleria dell&#x27;Accademia, ~1 hr (David, admission included)&lt;/li&gt;
            &lt;li&gt;Piazza del Duomo, ~15 min&lt;/li&gt;
            &lt;li&gt;Cathedral of Santa Maria del Fiore, ~30 min (included)&lt;/li&gt;
            &lt;li&gt;Museo dell&#x27;Opera del Duomo, ~15 min (included)&lt;/li&gt;
            &lt;li&gt;Pass by Piazza della Signoria, the Uffizi &amp;amp; Ponte Vecchio&lt;/li&gt;
            &lt;li&gt;Giotto&#x27;s Bell Tower, ~15 min climb (included; no lift)&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Meet:&lt;/b&gt; Statua di Manfredo Fanti, Piazza San Marco, guide holds a &quot;Walks In Europe&quot; sign. Ends at Ponte Vecchio. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Statua%20di%20Manfredo%20Fanti%2C%20Piazza%20San%20Marco%2C%20Firenze&quot;&gt;meeting-point map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
          &lt;b&gt;Know before you go&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Arrive 15 min early, tickets are timed; you can&#x27;t join after it starts.&lt;/li&gt;
            &lt;li&gt;Cathedral dress code: no sleeveless tops or shorts above the knee; no backpacks of any size.&lt;/li&gt;
            &lt;li&gt;Bring a hat/sun protection, parts are outdoors in full sun.&lt;/li&gt;
            &lt;li&gt;Duomo Museum and Baptistery are both scheduled, but timing may allow only one.&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Florence/Florence-In-A-Day-David-and-Duomo-Only/d519-51192P4&quot;&gt;View on Viator &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;

          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/1/1c/Aperol_Aperitivo_Aperitif_01.jpg&quot; alt=&quot;aperitivo&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;phcap&quot;&gt;representative photo&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; Aperitivo with a rooftop view over the Florence skyline and Duomo.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Rooftop bars fill at golden hour, go a bit early for a railing seat.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;

          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/e/e7/Firenze%2C_mercato_centrale%2C_interno%2C_capitello_e_decorazione_in_ferro_01.jpg&quot; alt=&quot;Mercato Centrale&quot; loading=&quot;lazy&quot;&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; The upstairs food hall at Mercato Centrale, many counters (pasta, pizza, bistecca, etc.), casual and quick.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; No reservation, grab a table and order from whichever stalls you like, easy first Florence night.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Mercato%20Centrale%2C%20Firenze&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;

  &lt;details class=&quot;day&quot;&gt;&lt;summary class=&quot;dhead&quot;&gt;&lt;div&gt;&lt;div class=&quot;dl&quot;&gt;🛵 Fri, Jul 17 — Tuscan Hills&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;Vespa day · Palazzo dei Conti&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;chev&quot;&gt;▶&lt;/div&gt;&lt;/summary&gt;
    &lt;div class=&quot;body&quot;&gt;
      &lt;div class=&quot;dayroute&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/dir/?api=1&amp;amp;travelmode=walking&amp;amp;origin=Santa%20Maria%20Novella%20station%2C%20Firenze&amp;amp;destination=Gelateria%20La%20Carraia%2C%20Piazza%20Nazario%20Sauro%2025r%2C%20Firenze&amp;amp;waypoints=Ristorante%20del%20Fagioli%2C%20Corso%20dei%20Tintori%2047r%2C%20Firenze%7CGelateria%20La%20Carraia%2C%20Firenze&quot;&gt;🗺️ Open today&#x27;s route in Google Maps (4 stops) &amp;rarr;&lt;/a&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:20 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Tuscan Vespa Tour — hills, food &amp;amp; Chianti &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Ref BR-1413735995. Meet Piazza dei Cavalleggeri → safety briefing + practice ride → one Vespa, two-up through Chianti (Piazzale Michelangelo, San Miniato). Lunch + wine at a country estate, bus back. &lt;b&gt;Lunch included.&lt;/b&gt;&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Full tour details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://media.tacdn.com/media/attractions-splice-spp-674x446/07/92/e1/5b.jpg&quot; alt=&quot;Tuscan Vespa tour&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Florence Vespa Tour: Tuscan Hills, Food &amp;amp; Chianti Wine&lt;/b&gt; (Walkabout Florence Tours). Booked ref BR-1413735995 &amp;middot; Fri Jul 17, 8:20 AM &amp;middot; ~6 hrs &amp;middot; English. You booked &lt;b&gt;one Vespa, two-up&lt;/b&gt;.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Overview:&lt;/b&gt; ride through the Tuscan hills behind a local guide, past Piazzale Michelangelo and San Miniato al Monte, then a traditional Tuscan meal with Chianti at a country estate.&lt;/div&gt;
          &lt;b&gt;What&#x27;s included&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Vespa rental (automatic, no gears) + helmet&lt;/li&gt;
            &lt;li&gt;Professional local guide, 2-way radio&lt;/li&gt;
            &lt;li&gt;Food + wine tasting at the country estate&lt;/li&gt;
            &lt;li&gt;Third-party insurance and fuel&lt;/li&gt;
          &lt;/ul&gt;
          &lt;b&gt;Not included&lt;/b&gt;
          &lt;ul&gt;&lt;li&gt;Gratuities; hotel pickup and drop-off&lt;/li&gt;&lt;/ul&gt;
          &lt;b&gt;How the day goes&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Garage safety briefing + practice ride&lt;/li&gt;
            &lt;li&gt;Ride past Piazzale Michelangelo &amp;amp; Pozzolatico onto the Chianti road (SS222)&lt;/li&gt;
            &lt;li&gt;Stops at Villa del Poggio Imperiale and Basilica San Miniato al Monte (panoramic views)&lt;/li&gt;
            &lt;li&gt;Lunch at a country estate once owned by Galileo: bruschetta, pasta, cheese &amp;amp; salami board with wine&lt;/li&gt;
            &lt;li&gt;Bus ride back&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Meet:&lt;/b&gt; by Santa Maria Novella station (Piazza della Stazione 27), &quot;WALKABOUT TOURS&quot; sign by the taxi stand. &lt;i&gt;Confirm exact spot/time on your voucher.&lt;/i&gt; &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Santa%20Maria%20Novella%20station%2C%20Firenze&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
          &lt;b&gt;Know before you go&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;&lt;b&gt;Bring your original physical driver&#x27;s license&lt;/b&gt; (no photo/copy); minimum age 18.&lt;/li&gt;
            &lt;li&gt;There&#x27;s a test ride; if you don&#x27;t clear it you ride an automatic electric Fiat instead.&lt;/li&gt;
            &lt;li&gt;Closed-toe shoes; ~2-3 hrs of the 6 are actual saddle time; damage waiver signed at the garage.&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Florence/Florence-Vespa-Tour-Tuscan-Hills-and-Italian-Cuisine/d519-5070FLORENCEVESPA&quot;&gt;View on Viator &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;Afternoon&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Free — wander Florence, a wine window, the Oltrarno.&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/2/27/Via_de%27_Federighi_4r%2C_casa%2C_buchetta_del_vino_1.jpg&quot; alt=&quot;Florence wine window&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Idea:&lt;/b&gt; a free Florence afternoon, wander the Oltrarno (artisan workshops, San Frediano) and find a buchetta del vino (wine window).&lt;/div&gt;&lt;div class=&quot;phcap&quot;&gt;representative photo&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;No agenda needed after the Vespa morning.&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:00 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Dinner: Ristorante del Fagioli &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;&lt;b&gt;Confirmed&lt;/b&gt; via Palazzo dei Conti concierge, under Arnold, table for 2. &lt;b&gt;Cash only&lt;/b&gt; (card system temporarily down). Tiny &amp;amp; popular. Corso dei Tintori 47r.
        &lt;details class=&quot;det&quot;&gt;&lt;summary&gt;About the restaurant&lt;/summary&gt;
          &lt;div class=&quot;phpair&quot;&gt;&lt;img src=&quot;https://dynamic-media-cdn.tripadvisor.com/media/photo-o/16/f3/54/10/photo0jpg.jpg&quot; alt=&quot;Ristorante del Fagioli exterior&quot; loading=&quot;lazy&quot;&gt;&lt;img src=&quot;https://dynamic-media-cdn.tripadvisor.com/media/photo-o/10/29/5a/ca/restaurant-interior.jpg&quot; alt=&quot;Ristorante del Fagioli interior&quot; loading=&quot;lazy&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Style:&lt;/b&gt; classic family-run Tuscan trattoria (since 1966), pure &quot;cucina povera,&quot; no trends.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Menu:&lt;/b&gt; bistecca alla Fiorentina (Chianina beef), ribollita, pappa al pomodoro, pici with aglione, tripe, handmade pasta; house cantucci to finish.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Atmosphere:&lt;/b&gt; rustic and sincere, with the open kitchen right at the entrance; tight and familial.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Good to know:&lt;/b&gt; cash only; small and popular, so reserve. Great after the Vespa/Chianti day. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Ristorante%20del%20Fagioli%2C%20Corso%20dei%20Tintori%2047r%2C%20Firenze&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;
      &lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Gelato — La Carraia&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://dynamic-media-cdn.tripadvisor.com/media/photo-o/05/e6/6f/75/gelateria-la-carraia.jpg&quot; alt=&quot;gelato&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Heads up:&lt;/b&gt; Gelateria Santa Trinita closed in 2024 (the spot is now a Venchi). Swap: &lt;b&gt;La Carraia&lt;/b&gt;, a beloved Florentine gelateria by Ponte alla Carraia, a short riverside walk away.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; La Carraia (Piazza Nazario Sauro 25r) is cash-friendly and walkable along the Arno. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Gelateria%20La%20Carraia%2C%20Firenze&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Gelateria%20La%20Carraia%2C%20Piazza%20Nazario%20Sauro%2025r%2C%20Firenze&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;

  &lt;details class=&quot;day&quot;&gt;&lt;summary class=&quot;dhead&quot;&gt;&lt;div&gt;&lt;div class=&quot;dl&quot;&gt;🎨 Sat, Jul 18 — Florence&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;Cooking + Uffizi · Palazzo dei Conti&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;chev&quot;&gt;▶&lt;/div&gt;&lt;/summary&gt;
    &lt;div class=&quot;body&quot;&gt;
      &lt;div class=&quot;dayroute&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/dir/?api=1&amp;amp;travelmode=walking&amp;amp;origin=Via%20de%27%20Bardi%2023r%2C%20Firenze&amp;amp;destination=I%27Brindellone%2C%20Piazza%20Piattellina%2010r%2C%20Firenze&amp;amp;waypoints=Cupola%20del%20Brunelleschi%2C%20Firenze%7CVivoli%2C%20Via%20dell%27Isola%20delle%20Stinche%207r%2C%20Firenze%7CPiazzale%20degli%20Uffizi%206%2C%20Firenze%7CPiazzale%20Michelangelo%2C%20Firenze&quot;&gt;🗺️ Open today&#x27;s route in Google Maps (6 stops) &amp;rarr;&lt;/a&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;10:00 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Pasta Cooking Class + Unlimited Wine &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Ref BR-1413733133 · Cooking Art Brunelleschi · 2.5 hrs, ends ~12:30. Includes lunch + Tuscan wine — &lt;b&gt;this is your lunch.&lt;/b&gt;&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Full tour details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://media.tacdn.com/media/attractions-splice-spp-674x446/12/57/3d/80.jpg&quot; alt=&quot;Pasta cooking class&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Florence: Pasta Cooking Class with Unlimited Wine&lt;/b&gt; (Florence with Elvis). Booked ref BR-1413733133 &amp;middot; Viator 212483P5 &amp;middot; Sat Jul 18, 10:00 AM &amp;middot; 2.5 hrs &amp;middot; English &amp;middot; small group (max 15). &lt;b&gt;This is your lunch.&lt;/b&gt;&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Overview:&lt;/b&gt; a hands-on, casual class for all skill levels, make three types of fresh pasta plus sauces with your chef while sipping unlimited Tuscan wine, then sit down and feast on what you made with even more wine.&lt;/div&gt;
          &lt;b&gt;Sample menu&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Tortello all&#x27;arrabbiata&lt;/li&gt;
            &lt;li&gt;Pappardelle with Tuscan ragù&lt;/li&gt;
            &lt;li&gt;Ravioli with butter and sage&lt;/li&gt;
          &lt;/ul&gt;
          &lt;b&gt;What&#x27;s included&lt;/b&gt;

            &lt;li&gt;&lt;b&gt;1 &amp;middot; Mercati di Rialto&lt;/b&gt; (~30 min): coffee + Venetian pastries to start, like the locals.&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;2 &amp;middot; San Polo&lt;/b&gt; (~15 min): the oldest bacaro in Venice (said to be Casanova&#x27;s haunt), cicchetti among wooden beams and copper pots.&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;3 &amp;middot; San Polo&lt;/b&gt; (~20 min): family-owned pastry shop, Venice&#x27;s Eastern-spiced sweet tradition (tiramisu, frittelle).&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;4 &amp;middot; Santa Croce&lt;/b&gt; (~20 min): another local-favorite bar for more cicchetti.&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;5 &amp;middot; Santa Croce&lt;/b&gt; (~20 min): the owner prepares regional cured meats + cheese with the stories behind them.&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;6 &amp;middot; San Polo&lt;/b&gt; (~45 min): locally frequented restaurant (visited by celebrity chefs): special-of-the-day pasta or risotto, fresh fish, and sarde in saor with wine.&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;7 &amp;middot; Cannaregio or Castello&lt;/b&gt; (~20 min): more cicchetti, district depends on the day.&lt;/li&gt;
            &lt;li&gt;&lt;b&gt;8 &amp;middot; Cannaregio&lt;/b&gt; (~25 min): artisan gelato to finish, plus how to spot a real one.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/details&gt;
      &lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:15 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Gondola at night, Castello back canals&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Optional nightcap on the water after the tour.&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/f/f4/Venice_Gondola_Grand_Canal.jpg&quot; alt=&quot;Venetian gondola&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;phcap&quot;&gt;representative photo&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; Optional night gondola through the quiet Castello back canals, a romantic nightcap on the water.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Standard gondola is a fixed rate (more after ~7 PM); agree the price before stepping in. Night rides feel more private.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Castello%2C%20Venezia&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/details&gt;

  &lt;details class=&quot;day travel&quot;&gt;&lt;summary class=&quot;dhead&quot;&gt;&lt;div&gt;&lt;div class=&quot;dl&quot;&gt;🚆 Tue, Jul 21 — Venice → Rome&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;Train · Singer Palace&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;chev&quot;&gt;▶&lt;/div&gt;&lt;/summary&gt;

        &lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Hotel details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://static.prod.r53.tablethotels.com/media/hotels/slideshow_images_staged/large/1416159.jpg&quot; alt=&quot;Singer Palace Hotel&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Your booked room:&lt;/b&gt; Double Room&lt;/div&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://images.trvl-media.com/lodging/22000000/21120000/21117500/21117476/117f305a.jpg&quot; alt=&quot;Double Room&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Singer Palace Hotel&lt;/b&gt; (5-star boutique, in an 1850 former Singer building) &amp;middot; Via Alessandro Specchi 10, historic centre.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Check-in&lt;/b&gt; 2:00 PM &amp;middot; &lt;b&gt;check-out&lt;/b&gt; 12:00 PM &amp;middot; homemade à-la-carte breakfast served on the rooftop.&lt;/div&gt;
          &lt;b&gt;Amenities&lt;/b&gt;

            &lt;li&gt;A/C, free WiFi, soundproofed windows, concierge, gym access&lt;/li&gt;

          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Singer%20Palace%20Hotel%2C%20Via%20Alessandro%20Specchi%2010%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt; &amp;middot; &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://singerpalacehotel.com/&quot;&gt;hotel site &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;

      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:26 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Frecciarossa Venezia → Roma Termini &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Frecciarossa 8419 &amp;middot; &lt;b&gt;arr 5:15 PM (delayed, was 4:24)&lt;/b&gt; &amp;middot; &lt;b&gt;coach 4, seats 18A/18B&lt;/b&gt; &amp;middot; PNR JEEEUN. Check in Singer Palace (by Piazza Venezia).&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/2/25/Frecciarossa_train_%28Rome%29_in_2023.03.jpg&quot; alt=&quot;Frecciarossa&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;phcap&quot;&gt;representative photo&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Train:&lt;/b&gt; Frecciarossa Venezia to Roma Termini, booked, ~3h45. Lunch on board.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Slow Venice morning + water taxi/vaporetto to Santa Lucia first; then check in at the Singer Palace.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Singer%20Palace%20Hotel%2C%20Via%20Alessandro%20Specchi%2010%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;5:25 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Taxi: Roma Termini &amp;rarr; Singer Palace &lt;span class=&quot;pill p-book&quot;&gt;~15 MIN&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;~2 km, about 10-15 min, roughly &amp;euro;12-15. Official white taxi rank outside Termini. Check-in opened at 2 PM. You will be at the hotel ~5:40, so drop bags and freshen up.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Hotel:&lt;/b&gt; Singer Palace, Via Alessandro Specchi 10 (by Piazza Venezia). Walk times: Pantheon ~5 min, Ghetto ~9-10 min, Colosseum ~12-15 min.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/dir/?api=1&amp;amp;travelmode=driving&amp;amp;origin=Roma%20Termini%2C%20Roma&amp;amp;destination=Singer%20Palace%20Hotel%2C%20Via%20Alessandro%20Specchi%2010%2C%20Roma&quot;&gt;driving route &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:20 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Piazza del Campidoglio + Roman Forum overlook&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;~5 min walk, and the only stop tonight before dinner. Michelangelo&#x27;s square, then the terrace on Via del Campidoglio for the Forum view at golden hour. Free, and the best view in Rome at this hour.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why:&lt;/b&gt; Michelangelo designed the piazza and its star-pattern paving; the terrace just off it looks straight down over the Roman Forum.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Hours/ticket:&lt;/b&gt; square and terrace free, always open.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Piazza%20del%20Campidoglio%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:10 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Taxi to Trastevere &lt;span class=&quot;pill p-done&quot;&gt;&amp;#10003; ARRANGED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;The hotel (Anastasiya) is calling your taxi for ~7:10 PM. About 10 min over to Trastevere.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Dinner: Spirito DiVino &lt;span class=&quot;pill p-done&quot;&gt;&amp;#10003; BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;&lt;b&gt;Confirmed, table for 2&lt;/b&gt;, booked through the Singer Palace. Via dei Genovesi 31 a/b, Trastevere &amp;middot; +39 06 589 66 89.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why here:&lt;/b&gt; family-run by chef Eliana Catalani since 1998. Slow Food, market-bought that morning, nothing frozen or fried, ancient Roman recipes including a pork dish from the age of the Caesars.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Do this:&lt;/b&gt; ask to see the cellar. It dates to roughly 80 BC, older than the Colosseum, and holds around 800 labels.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Cost:&lt;/b&gt; about &amp;euro;30-60 per person. Dinner 19:00-22:30, closed Sundays.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Spirito%20DiVino%2C%20Via%20dei%20Genovesi%2031%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:00 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Janiculum + Fontanone &lt;span class=&quot;pill p-opt&quot;&gt;OPTIONAL&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;15-20 min uphill from the restaurant to Piazzale Garibaldi and the Fontana dell&#x27;Acqua Paola. The widest panorama in Rome, city lit up.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Only if you have the legs.&lt;/b&gt; Colosseum is 8:45 AM tomorrow, so heading straight back is a fine call too.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Backup slot:&lt;/b&gt; tomorrow ~5:30 PM before the 6:40 food tour, since that meeting point sits right below this hill.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Fontana%20dell%27Acqua%20Paola%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;10:00 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Gelato — Giolitti&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/0/01/GiolittiCafeRoma.jpg&quot; alt=&quot;Giolitti&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; historic Rome gelateria near the Pantheon. Pay at the register first, then take the receipt to the counter.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Giolitti%2C%20Via%20degli%20Uffici%20del%20Vicario%2040%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/details&gt;

  &lt;details class=&quot;day&quot;&gt;&lt;summary class=&quot;dhead&quot;&gt;&lt;div&gt;&lt;div class=&quot;dl&quot;&gt;🏟️ Wed, Jul 22 — Ancient Rome&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;Colosseum + food tour · Singer Palace&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;chev&quot;&gt;▶&lt;/div&gt;&lt;/summary&gt;
    &lt;div class=&quot;body&quot;&gt;
      &lt;div class=&quot;dayroute&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/dir/?api=1&amp;amp;travelmode=walking&amp;amp;origin=Piazza%20del%20Colosseo%2021%2C%20Roma&amp;amp;destination=Trastevere%2C%20Roma&amp;amp;waypoints=Carcere%20Mamertino%2C%20Roma%7CAi%20Tre%20Scalini%2C%20Via%20Panisperna%20251%2C%20Roma%7CSan%20Pietro%20in%20Vincoli%2C%20Roma%7CBasilica%20di%20Santa%20Maria%20Maggiore%2C%20Roma&quot;&gt;🗺️ Open today&#x27;s route in Google Maps (6 stops) &amp;rarr;&lt;/a&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:45 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Colosseum (Arena) + Roman Forum &amp;amp; Palatine &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Viator #1413384135 · meet Piazza del Colosseo 21 · bring ID, water, hat.&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Full tour details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://media.tacdn.com/media/attractions-splice-spp-674x446/0b/9b/6b/e9.jpg&quot; alt=&quot;Colosseum guided tour&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Expert Guided Tour of Colosseum Arena OR Underground, and Forum&lt;/b&gt; (Touriks). Booked ref 1413384135 &amp;middot; Viator 55341P7 &amp;middot; Wed Jul 22, 8:45 AM &amp;middot; ~3 hrs &amp;middot; English &amp;middot; max 25. You booked the &lt;b&gt;Arena floor&lt;/b&gt; (not the Underground).&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Overview:&lt;/b&gt; access parts of the Colosseum usually off-limits, then the Roman Forum and Palatine Hill with a guide. (The Arena option does not include the Underground.)&lt;/div&gt;
          &lt;b&gt;What&#x27;s included&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Colosseum entry with Arena-floor access + reservation fee&lt;/li&gt;
            &lt;li&gt;Guided Roman Forum &amp;amp; Palatine Hill&lt;/li&gt;
            &lt;li&gt;Live expert guide + sterilized headsets, full on-site assistance&lt;/li&gt;
          &lt;/ul&gt;
          &lt;b&gt;Not included&lt;/b&gt;
          &lt;ul&gt;&lt;li&gt;The Colosseum upper levels; the Underground section (that&#x27;s the separate Underground option)&lt;/li&gt;&lt;/ul&gt;
          &lt;b&gt;Itinerary&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Colosseum, ~1h10 + ~30 min (Arena floor)&lt;/li&gt;
            &lt;li&gt;Arch of Constantine, ~10 min&lt;/li&gt;
            &lt;li&gt;Roman Forum, ~40 min&lt;/li&gt;
            &lt;li&gt;Palatine Hill, ~30 min&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Meet:&lt;/b&gt; the green kiosk at street level outside Colosseo metro (Line B), staff hold a yellow Touriks sign. &lt;b&gt;Arrive by 8:15&lt;/b&gt; (30 min early); the group leaves ~15 min before start for security. Ends in the Roman Forum. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Piazza%20del%20Colosseo%2021%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
          &lt;b&gt;Know before you go&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;&lt;b&gt;Tickets are nominative&lt;/b&gt;, bring a passport/ID matching the booking names or entry can be denied.&lt;/li&gt;
            &lt;li&gt;Strict, non-skippable security at both the Colosseum and the Forum; no big backpacks/trolleys, glass/metal containers, or sprays.&lt;/li&gt;
            &lt;li&gt;Lots of uneven ancient steps and little shade, comfy shoes, hat &amp;amp; water.&lt;/li&gt;
            &lt;li&gt;Site order can vary (Colosseum or Forum first); weather-dependent.&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Rome/Expert-Guided-Tour-of-Colosseum-Underground-Arena-and-Forum/d511-55341P7&quot;&gt;View on Viator &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;10:30 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Arch of Titus (in the Forum)&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/d/da/Arch_of_Titus_20190917.jpg&quot; alt=&quot;Arch of Titus&quot; loading=&quot;lazy&quot;&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; The Arch of Titus, inside the Forum on your tour path, the menorah relief depicts the sack of Jerusalem (70 AD).&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Your guide will point it out; great photo looking down the Via Sacra.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:15 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Mamertine Prison&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/7/78/Carcere_Mamertino_Rome.JPG&quot; alt=&quot;Mamertine Prison&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why:&lt;/b&gt; Rome&#x27;s oldest prison (the Tullianum dungeon, ~7th c. BC); held Vercingetorix and, by tradition, Saints Peter and Paul.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Ticket:&lt;/b&gt; ~&amp;euro;15 adult / &amp;euro;10 reduced, sold as a timed entry + ~1-hr guided bundle (book ahead).&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Carcere%20Mamertino%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;1:00 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Lunch — Ai Tre Scalini (Monti)&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;

          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/c/c4/Santa_Maria_Maggiore_Front.JPG&quot; alt=&quot;Santa Maria Maggiore&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why:&lt;/b&gt; one of Rome&#x27;s four papal major basilicas, famed for 5th-century mosaics; Pope Francis was buried here in April 2025.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Hours/ticket:&lt;/b&gt; nave free, roughly daily 07:00&amp;ndash;18:45. The museum/loggia/terraces are a separate paid ticket (price varies, verify).&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; cover shoulders &amp;amp; knees. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Basilica%20di%20Santa%20Maria%20Maggiore%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;

          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/8/86/2016_Piazza_di_Santa_Maria_in_Trastevere_01.jpg&quot; alt=&quot;Trastevere, Rome&quot; loading=&quot;lazy&quot;&gt;

          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Twilight Trastevere Food Tour by Eating Europe&lt;/b&gt; (&quot;Winner 2026&quot;). Booked ref 1413716311 &amp;middot; Viator 5553P13 &amp;middot; Wed Jul 22, 6:40 PM &amp;middot; ~4 hrs &amp;middot; small group. &lt;b&gt;This is dinner.&lt;/b&gt;&lt;/div&gt;

          &lt;ul&gt;
            &lt;li&gt;A pizza tasting and a sit-down pasta dinner with wine pairing&lt;/li&gt;

  &lt;details class=&quot;day anniv&quot;&gt;&lt;summary class=&quot;dhead&quot;&gt;&lt;div&gt;&lt;div class=&quot;dl&quot;&gt;⛪ Thu, Jul 23 — Vatican + Anniversary&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;The big night · Singer Palace&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;chev&quot;&gt;▶&lt;/div&gt;&lt;/summary&gt;
    &lt;div class=&quot;body&quot;&gt;
      &lt;div class=&quot;dayroute&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/dir/?api=1&amp;amp;travelmode=walking&amp;amp;origin=Via%20Tunisi%204%2C%20Roma&amp;amp;destination=Singer%20Palace%20Hotel%2C%20Via%20Alessandro%20Specchi%2010%2C%20Roma&amp;amp;waypoints=Prati%2C%20Roma%7CCatacombe%20di%20San%20Callisto%2C%20Roma%7CRistorante%20La%20Campana%2C%20Vicolo%20della%20Campana%2018%2C%20Roma&quot;&gt;🗺️ Open today&#x27;s route in Google Maps (5 stops) &amp;rarr;&lt;/a&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;All day&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Church dress — shoulders/knees covered, no metal belt buckle (Vatican security).&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/6/6c/St_Peter%27s_Basilica_fa%C3%A7ade.jpg&quot; alt=&quot;St Peter&#x27;s Basilica&quot; loading=&quot;lazy&quot;&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;All day:&lt;/b&gt; St Peter&#x27;s and the Vatican enforce a dress code, shoulders and knees covered for both of you.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Carry a light scarf/shawl; avoid sleeveless tops and short shorts. No large bags.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;8:00 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Vatican Museums, Sistine Chapel &amp;amp; St Peter&#x27;s &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Viator #1413258895 · bring ID, arrive early.&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Full tour details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://media.tacdn.com/media/attractions-splice-spp-674x446/0f/ba/c1/d8.jpg&quot; alt=&quot;Vatican guided tour&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Vatican Museums, Sistine Chapel &amp;amp; St Peter&#x27;s Basilica Guided Tour&lt;/b&gt; (City Wonders). Booked ref 1413258895 &amp;middot; Viator 3731VATICAN &amp;middot; Thu Jul 23, 8:00 AM &amp;middot; ~3 hrs &amp;middot; English &amp;middot; group of 20 or fewer.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Overview:&lt;/b&gt; skip-the-line into the Vatican Museums and straight to the highlights, then the Sistine Chapel and St Peter&#x27;s Basilica.&lt;/div&gt;
          &lt;b&gt;What&#x27;s included&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Reserved priority (skip-the-line) access to the Vatican Museums&lt;/li&gt;
            &lt;li&gt;Guided visit of St Peter&#x27;s Basilica + Sistine Chapel access&lt;/li&gt;
            &lt;li&gt;Audio headsets; small group; a leaflet for the Sistine Chapel &amp;amp; St Peter&#x27;s&lt;/li&gt;
          &lt;/ul&gt;
          &lt;b&gt;Not included&lt;/b&gt;
          &lt;ul&gt;&lt;li&gt;Gratuities&lt;/li&gt;&lt;/ul&gt;
          &lt;b&gt;Itinerary&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;Vatican Museums, ~1h15 (Gallery of Maps, Pinecone Courtyard, &quot;Sphere within a Sphere&quot;)&lt;/li&gt;
            &lt;li&gt;Sistine Chapel, ~20 min (silence, no photos inside)&lt;/li&gt;
            &lt;li&gt;St Peter&#x27;s Basilica, ~30 min (Michelangelo&#x27;s Pietà, Bernini&#x27;s altar)&lt;/li&gt;
            &lt;li&gt;Ends at St Peter&#x27;s Square; you can stay in the Basilica after&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Meet:&lt;/b&gt; Via Tunisi 4, at the bottom of the steps across from the Vatican Museums entrance, next to Caffè Vaticano (Metro A, Ottaviano). &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Via%20Tunisi%204%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
          &lt;b&gt;Know before you go&lt;/b&gt;
          &lt;ul&gt;
            &lt;li&gt;&lt;b&gt;All travelers&#x27; full names must be on the booking&lt;/b&gt; for St Peter&#x27;s access, bring matching ID.&lt;/li&gt;
            &lt;li&gt;Strict dress code: shoulders &amp;amp; knees covered; remove hats in the Sistine Chapel.&lt;/li&gt;
            &lt;li&gt;Your Thursday 8 AM avoids the Wednesday Papal-Audience closure of St Peter&#x27;s; ceremonies can still cause last-minute closures.&lt;/li&gt;
            &lt;li&gt;Lots of walking; not wheelchair/stroller accessible; security can be slow even with priority access.&lt;/li&gt;
          &lt;/ul&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.viator.com/tours/Rome/Skip-the-Line-Vatican-Museums-and-Sistine-Chapel-Guided-Tour/d511-3731VATICAN&quot;&gt;View on Viator &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:00 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Lunch: L&#x27;Antica Pizzeria da Michele (Flaminio)&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Via Flaminia 82 &amp;middot; +39 06 3260 0432 &amp;middot; opens 12:00. ~10 min taxi from the Vatican, or Metro A Ottaviano &amp;rarr; Flaminio then an 8-min walk.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; the Rome branch of the famous Naples pizzeria. Neapolitan dough, San Marzano tomato, buffalo mozzarella.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;No reservations&lt;/b&gt; reported, so arrive right at noon to beat the queue. Call ahead to confirm hours.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Quirk:&lt;/b&gt; it sits inside the Explora museum building, walk in the main doors and past the cafeteria. You are not lost.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Antica%20Pizzeria%20da%20Michele%2C%20Via%20Flaminia%2082%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;1:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Optional — Roman Catacombs (San Callisto) &lt;span class=&quot;pill p-opt&quot;&gt;OPT&lt;/span&gt;&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/5/54/Catacombe_di_San_Callisto_-_panoramio_%281%29.jpg&quot; alt=&quot;Catacombs of San Callisto&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why:&lt;/b&gt; among Rome&#x27;s largest catacombs (~20 km of galleries); the Crypt of the Popes holds nine popes and dozens of martyrs.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Ticket:&lt;/b&gt; ~&amp;euro;10 / &amp;euro;7 reduced, guided group tour only (~40 min, every 30 min).&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Hours:&lt;/b&gt; 09:00&amp;ndash;12:00 &amp;amp; 14:00&amp;ndash;17:00; &lt;b&gt;closed Wednesdays&lt;/b&gt;. South on the Appian Way, allow travel time.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Catacombe%20di%20San%20Callisto%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;4:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Santa Maria sopra Minerva + Largo di Torre Argentina&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/9/98/Bernini_Elefant.JPG&quot; alt=&quot;Bernini elephant, Santa Maria sopra Minerva&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Why:&lt;/b&gt; Rome&#x27;s only major Gothic church interior, home to Michelangelo&#x27;s Risen Christ; Bernini&#x27;s elephant-and-obelisk stands in the piazza. Next door, Largo di Torre Argentina, the temple ruins where Caesar fell (now a cat sanctuary).&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Hours:&lt;/b&gt; church free, roughly Mon&amp;ndash;Fri 08:00&amp;ndash;20:00, weekends split around Mass. Largo Argentina free to view from the railings, area open Tue&amp;ndash;Sun.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Santa%20Maria%20sopra%20Minerva%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:00 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Aperitivo&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/1/1c/Aperol_Aperitivo_Aperitif_01.jpg&quot; alt=&quot;aperitivo&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;phcap&quot;&gt;representative photo&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; A pre-dinner Aperol Spritz in a favorite piazza before the anniversary dinner.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Keep it light, La Campana is a full Roman dinner.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Anniversary dinner: La Campana &lt;span class=&quot;pill p-anniv&quot;&gt;ANNIV&lt;/span&gt; &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Vicolo della Campana 18 &amp;middot; Rome&#x27;s oldest restaurant &amp;middot; smart casual &amp;middot; &lt;b&gt;confirmed for 2 at 7:30 PM&lt;/b&gt; (Singer Palace concierge). Mention the anniversary.
        &lt;details class=&quot;det&quot;&gt;&lt;summary&gt;About the restaurant&lt;/summary&gt;
          &lt;div class=&quot;phpair&quot;&gt;&lt;img src=&quot;https://dynamic-media-cdn.tripadvisor.com/media/photo-o/28/a7/1e/58/caption.jpg&quot; alt=&quot;La Campana exterior&quot; loading=&quot;lazy&quot;&gt;&lt;img src=&quot;https://dynamic-media-cdn.tripadvisor.com/media/photo-o/19/85/0f/96/20191004-145934-largejpg.jpg&quot; alt=&quot;La Campana interior&quot; loading=&quot;lazy&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Style:&lt;/b&gt; Rome&#x27;s oldest restaurant (since 1518, a Caravaggio haunt), classic &lt;i&gt;cucina romana&lt;/i&gt;, refined but not stuffy.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Menu:&lt;/b&gt; cacio e pepe, carciofi alla giudia (fried artichokes), tagliolini with anchovies &amp;amp; pecorino, traditional Roman offal if you&#x27;re adventurous, plus good vegetarian options.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Atmosphere:&lt;/b&gt; spacious, well-lit, elegant rooms; black-vested career waiters; a convivial mix of regulars and locals. The most &quot;occasion&quot; of your five dinners.&lt;/div&gt;
          &lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Good to know:&lt;/b&gt; ~10 min walk from the Singer (near Piazza Navona); reserve ahead and mention the anniversary. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Ristorante%20La%20Campana%2C%20Vicolo%20della%20Campana%2018%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
        &lt;/details&gt;
      &lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:30 PM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Rooftop nightcap — Singer Palace rooftop. Let it land.&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/3/37/Rome_Rooftops_-_May_2015_-_Dome_City_1.jpg&quot; alt=&quot;Rome rooftops&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;phcap&quot;&gt;representative photo&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;What:&lt;/b&gt; A nightcap on the Singer Palace rooftop terrace to close the trip.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Let the night land slowly, last evening in Rome.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Singer%20Palace%20Hotel%2C%20Via%20Alessandro%20Specchi%2010%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/details&gt;

  &lt;details class=&quot;day travel&quot;&gt;&lt;summary class=&quot;dhead&quot;&gt;&lt;div&gt;&lt;div class=&quot;dl&quot;&gt;🏠 Fri, Jul 24 — Fly Home&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;FCO → ATL → PNS&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;chev&quot;&gt;▶&lt;/div&gt;&lt;/summary&gt;
    &lt;div class=&quot;body&quot;&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;6:15 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;Taxi to FCO (~€50)&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;&lt;b&gt;VAT + customs below.&lt;/b&gt; Leave by 6:15 for the 9:45 flight (~45-60 min to FCO, be there ~2.5 hrs early for the long-haul).&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/e/e6/Aeroporto_di_Roma-Fiumicino_in_2021.02.jpg&quot; alt=&quot;Rome Fiumicino&quot; loading=&quot;lazy&quot;&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Getting out:&lt;/b&gt; Pre-book a taxi to Fiumicino (~€50 flat from the centro), or the Leonardo Express from Termini.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Allow ~45-60 min to the airport plus time for the long-haul check-in.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;At FCO&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;VAT refund on the Murano glass &lt;span class=&quot;pill p-book&quot;&gt;DO FIRST&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;&lt;b&gt;Must validate or you get charged the VAT back.&lt;/b&gt; The Murano shop gave you the discount at purchase, so the operator will bill it to your card if the form is not stamped on export.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;At FCO, before security &amp;amp; before checking a bag:&lt;/b&gt; take the &lt;b&gt;Tax Free form + store receipt + passport&lt;/b&gt; to the customs / Dogana OTELLO 2.0 kiosk, then the Global Blue / Planet desk.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Keep the Murano glass in your carry-on&lt;/b&gt; &amp;mdash; they can ask to see it, and it is fragile anyway.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Give yourself an extra 30-45 min&lt;/b&gt; for this.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;Landing&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;US customs (CBP) in Atlanta&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;Declare everything you bought and &lt;b&gt;all food&lt;/b&gt;. Free and easy, hiding it is what gets fined.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Declare:&lt;/b&gt; the &lt;b&gt;olive oil&lt;/b&gt; (sealed, no limit, fine) and the &lt;b&gt;chocolate / snacks / candy&lt;/b&gt; and &lt;b&gt;pistachio cream&lt;/b&gt; (all commercially sealed, fine). Tick &quot;yes&quot; to food on the CBP app/kiosk.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Allowance:&lt;/b&gt; $800 duty-free per person (~$1,600 together). Over that is a small duty, no big deal.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Not allowed:&lt;/b&gt; fresh fruit, any meat/salami, anything homemade or loose.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;Packing&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;How to pack your bags&lt;/div&gt;&lt;div class=&quot;m&quot;&gt;1 checked + 1 carry-on + 1 personal each.&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Checked:&lt;/b&gt; the &lt;b&gt;olive oil&lt;/b&gt; and the &lt;b&gt;pistachio cream&lt;/b&gt; (both over 100ml / a spread, cannot fly in the cabin). Wrap each in clothes inside a sealed zip bag, cushioned in the middle; jars can seep. Watch the &lt;b&gt;50 lb / 23 kg&lt;/b&gt; limit.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Carry-on:&lt;/b&gt; the &lt;b&gt;Murano glass&lt;/b&gt;, padded, never checked (also your VAT-show item). No liquids over 100ml.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Chocolate / snacks / candy:&lt;/b&gt; pack anywhere, just declare them on arrival.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Personal item:&lt;/b&gt; passports, wallets, phones, chargers, meds, one change of clothes each &amp;mdash; you connect in Atlanta, so keep a day of essentials on you.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:45 AM&lt;/div&gt;&lt;div class=&quot;x&quot;&gt;DL215 FCO → ATL 2:54 PM · then DL3059 ATL → PNS · home 6:25 PM &lt;span class=&quot;pill p-done&quot;&gt;✓ BOOKED&lt;/span&gt;&lt;/div&gt;&lt;details class=&quot;det&quot;&gt;&lt;summary&gt;Details&lt;/summary&gt;
          &lt;img class=&quot;ph&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/5/55/Delta_Air_Lines_Airbus_A330-900_N421DX_departing_Boston_August_2025_2.jpg&quot; alt=&quot;flight&quot; loading=&quot;lazy&quot;&gt;
          &lt;div class=&quot;phcap&quot;&gt;Delta Airbus A330-900neo (as scheduled)&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Home:&lt;/b&gt; DL215 FCO to ATL (lands ~2:54 PM), then DL3059 ATL to PNS. Booked.&lt;/div&gt;&lt;div class=&quot;dd&quot;&gt;&lt;b&gt;Tip:&lt;/b&gt; Keep your passport + any tax-refund (VAT) paperwork handy; allow time for the connection in Atlanta.&lt;/div&gt;&lt;/details&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/details&gt;

  &lt;div class=&quot;foot&quot;&gt;Tocca un giorno per aprire · 🇮🇹&lt;/div&gt;
&lt;/div&gt;

&lt;!-- ESSENTIALS --&gt;
&lt;div class=&quot;view wrap&quot; id=&quot;v-info&quot;&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;📲 Trip notes&lt;/h3&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Most tours are booked&lt;/b&gt; — just save each voucher offline and arrive ~15 min early.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Set up WhatsApp before you go.&lt;/b&gt; Hotels and drivers communicate there, not email.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Leave the hairdryer home&lt;/b&gt; — every hotel has one.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Walk-in dinners are fine&lt;/b&gt; for most spots; keep the famous ones reserved (La Campana, del Fagioli, Il Paradiso Perduto).&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Italian breakfast = stand-up espresso + cornetto at a bar (~€3–5), faster and better than a sit-down. Lunetta has a spa/pool for recovery.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;💶 Money&lt;/h3&gt;
    &lt;div class=&quot;it&quot;&gt;Carry €50–80 small bills daily. Tips: €2–5 cash on the table (a bit more for the anniversary dinners).&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&quot;Coperto&quot; (€2–4/person) is a legal table charge, not a scam.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Bank ATMs only (Unicredit, Intesa Sanpaolo, Banco BPM). Never Euronet/airport.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;City tourist tax is paid in cash at each hotel (a few € pp/night).&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;⛪ Dress &amp;amp; churches&lt;/h3&gt;
    &lt;div class=&quot;it&quot;&gt;Scarf every day. Shoulders &amp;amp; knees covered. Hats off. Speak quietly. No metal belt buckle at the Vatican.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;🍝 Food &amp;amp; drink&lt;/h3&gt;
    &lt;div class=&quot;it&quot;&gt;Espresso standing €1.50, seated €3–4. No cappuccino after 11 AM.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Small shops: pay the cashier first, then order at the bar.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Lunch 12:30–2:30, dinner from 7:30. Empty at 6 PM = tourist trap.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;House wine by the carafe — cheap and good.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Elizabeth:&lt;/b&gt; &quot;Niente frutti di mare per mia moglie. Pesce delicato o carne, per favore.&quot;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;🍴 More Rome eats (Maddy&#x27;s picks)&lt;/h3&gt;
    &lt;div class=&quot;nt&quot;&gt;Backup/extra options from Maddy&#x27;s Rome guide, beyond what&#x27;s on your plan.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Ristorante La Tavernetta 48&lt;/b&gt; &amp;middot; charming vine-covered outdoor tables; cacio e pepe with black truffle &amp;amp; pancetta, lobster spaghetti, tiramisù. Reserve ahead. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Ristorante%20La%20Tavernetta%2048%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;La Prosciutteria (Trastevere)&lt;/b&gt; &amp;middot; big charcuterie &amp;amp; cheese boards with wine, perfect casual lunch. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=La%20Prosciutteria%20Trastevere%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Hostaria La Botticella&lt;/b&gt; &amp;middot; Maddy&#x27;s favorite in Rome: cozy, local-packed traditional spot; grilled lamb chops, black-truffle cheese ravioli. Reserve a day ahead. &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=Hostaria%20La%20Botticella%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Ai Tre Scalini (Monti)&lt;/b&gt; &amp;middot; gnocchi &amp;amp; lasagna, local and well-priced (~€25 + wine). &lt;i&gt;Already on your plan (Jul 22 lunch).&lt;/i&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Osteria Barberini&lt;/b&gt; &amp;middot; the truffle spot (risotto, truffle lasagna). &lt;i&gt;Booked, Jul 15 dinner.&lt;/i&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Osteria Quarantaquattro (Osteria 44)&lt;/b&gt; &amp;middot; special-occasion; seafood gnocchi, carbonara, sea bass; owner Sergio. &lt;b&gt;Note: shows as temporarily closed, verify before going.&lt;/b&gt; &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://www.google.com/maps/search/?api=1&amp;amp;query=44%20Osteria%20Quarantaquattro%2C%20Via%20Aureliana%2C%20Roma&quot;&gt;map &amp;rarr;&lt;/a&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Giolitti&lt;/b&gt; &amp;middot; legendary historic gelateria. &lt;i&gt;Already on your plan (Jul 21).&lt;/i&gt;&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;&lt;b&gt;Gelateria dei Gracchi&lt;/b&gt; &amp;middot; Maddy&#x27;s pick for the best gelato in Rome. &lt;i&gt;Already on your plan (Jul 15).&lt;/i&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;🌡️ Heat &amp;amp; safety&lt;/h3&gt;
    &lt;div class=&quot;it&quot;&gt;88–98°F. Outdoors before noon &amp;amp; after 5 PM; museums/indoors midday. Hydrate at nasoni, sunscreen, fold-up fan.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Front pockets / zipped crossbody. Watch: Colosseum entrance, Vatican exit, Trevi, train stations.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Flower/bracelet shoved in your hand → give it back, walk away.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;🚆 Trains&lt;/h3&gt;
    &lt;div class=&quot;it&quot;&gt;App QR = no validation needed. Be on the platform a few min early; Frecciarossa doors close on time.&lt;/div&gt;
    &lt;div class=&quot;it&quot;&gt;Venice = Santa Lucia (island), not Mestre. Florence = Santa Maria Novella. Rome = Termini.&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;🗣️ Phrases&lt;/h3&gt;

    &lt;div class=&quot;phr&quot;&gt;&lt;b&gt;Grazie&lt;/b&gt;&lt;span&gt;Thank you&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;phr&quot;&gt;&lt;b&gt;Per favore&lt;/b&gt;&lt;span&gt;Please&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;phr&quot;&gt;&lt;b&gt;Mi scusi&lt;/b&gt;&lt;span&gt;Excuse me&lt;/span&gt;&lt;/div&gt;

    &lt;div class=&quot;phr&quot;&gt;&lt;b&gt;Il conto, per favore&lt;/b&gt;&lt;span&gt;The check, please&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;phr&quot;&gt;&lt;b&gt;Un tavolo per due&lt;/b&gt;&lt;span&gt;A table for two&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;phr&quot;&gt;&lt;b&gt;Parla inglese?&lt;/b&gt;&lt;span&gt;Do you speak English?&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;info&quot;&gt;&lt;h3&gt;❤️ The most important one&lt;/h3&gt;
    &lt;p&gt;When the weight of a place lands — the Sistine ceiling, the Colosseum arena, sunset over the Arno — stop. Hold hands. Let it land. The itinerary can wait ten minutes.&lt;/p&gt;
  &lt;/div&gt;
  &lt;div class=&quot;foot&quot;&gt;Buon viaggio 🇮🇹&lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
  const tabs=[...document.querySelectorAll(&#x27;nav button&#x27;)];
  const views={ &#x27;v-itin&#x27;:document.getElementById(&#x27;v-itin&#x27;),&#x27;v-check&#x27;:document.getElementById(&#x27;v-check&#x27;),&#x27;v-info&#x27;:document.getElementById(&#x27;v-info&#x27;) };
  tabs.forEach(t=&gt;t.addEventListener(&#x27;click&#x27;,()=&gt;{
    tabs.forEach(x=&gt;x.classList.remove(&#x27;on&#x27;));t.classList.add(&#x27;on&#x27;);
    Object.values(views).forEach(v=&gt;v.classList.remove(&#x27;active&#x27;));
    views[t.dataset.v].classList.add(&#x27;active&#x27;);window.scrollTo(0,0);
  }));
  const KEY=&quot;italy2026app_v2&quot;;
  const boxes=[...document.querySelectorAll(&#x27;#v-check input[type=checkbox]&#x27;)];
  document.getElementById(&#x27;total&#x27;).textContent=boxes.length;
  function save(){localStorage.setItem(KEY,JSON.stringify(boxes.map(b=&gt;b.checked)));}
  function load(){try{const s=JSON.parse(localStorage.getItem(KEY)||&quot;[]&quot;);boxes.forEach((b,i)=&gt;b.checked=!!s[i]);}catch(e){}}
  function render(){let n=0;boxes.forEach(b=&gt;{const it=b.closest(&#x27;.citem&#x27;);b.checked?(it.classList.add(&#x27;done&#x27;),n++):it.classList.remove(&#x27;done&#x27;);});
    document.getElementById(&#x27;count&#x27;).textContent=n;const p=boxes.length?Math.round(n/boxes.length*100):0;
    document.getElementById(&#x27;pct&#x27;).textContent=p+&#x27;%&#x27;;document.getElementById(&#x27;fill&#x27;).style.width=p+&#x27;%&#x27;;}
  function resetAll(){boxes.forEach(b=&gt;b.checked=false);save();render();}
  boxes.forEach(b=&gt;b.addEventListener(&#x27;change&#x27;,()=&gt;{save();render();}));
  load();render();
&lt;/script&gt;

  &lt;h1&gt;🇮🇹 Italy — Follow-Along Day Guide&lt;/h1&gt;
  &lt;div class=&quot;sub&quot;&gt;Matt &amp;amp; Elizabeth · July 14-24, 2026 · just follow it top to bottom&lt;/div&gt;
  &lt;div class=&quot;how&quot;&gt;&lt;b&gt;How to use:&lt;/b&gt; Each day runs in order, top to bottom. Times are a suggested flow for the best light, coolest hours, and thinnest crowds — except booked items, which sit at their confirmed times. Italic lines are short walks between stops. Rest blocks are built in where July heat calls for them.&lt;/div&gt;

  &lt;div class=&quot;day rome&quot;&gt;
    &lt;div class=&quot;dhead&quot;&gt;&lt;div class=&quot;num&quot;&gt;&lt;b&gt;1&lt;/b&gt;&lt;span&gt;Wed 15&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ht&quot;&gt;&lt;div class=&quot;dl&quot;&gt;Wed, Jul 15 · Rome · Arrival&lt;/div&gt;&lt;div class=&quot;dn&quot;&gt;Land &amp;amp; ease into the Eternal City&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;dbody&quot;&gt;

      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;7:35a&lt;/div&gt;&lt;div class=&quot;src b&quot;&gt;B&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Land at FCO.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Leonardo Express to Termini (€14/pp, ~32 min) or a flat white taxi (€50). Never accept ride offers in arrivals.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;9:30a&lt;/div&gt;&lt;div class=&quot;src p&quot;&gt;P&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Drop bags at the hotel (Hotel Lunetta, by Campo de&#x27; Fiori).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Room may not be ready; leave luggage and head out.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;lnk&quot;&gt;5-min walk toward the Pantheon&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;10:30a&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Stand-up espresso + cornetto.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Maddy&#x27;s must-do: espresso at the bar. Sant&#x27;Eustachio Il Caffè is the classic.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;11:00a&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Pantheon (see it yourselves).&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Best-preserved ancient temple. ~€5 ticket on arrival, line moves fast. Active church: shoulders/knees covered.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;lnk&quot;&gt;2-min walk to Piazza Navona&lt;/div&gt;

      &lt;div class=&quot;ev&quot;&gt;&lt;div class=&quot;t&quot;&gt;12:30p&lt;/div&gt;&lt;div class=&quot;src m&quot;&gt;M&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Lunch: Osteria del Sostegno.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;Maddy&#x27;s secret local spot behind the Pantheon. Cacio e pepe or carbonara.&lt;/span&gt; &lt;a class=&quot;bk&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; href=&quot;https://maddysavenue.com/where-to-eat-in-rome-italy/&quot;&gt;her Rome guide →&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;

      &lt;div class=&quot;ev rest&quot;&gt;&lt;div class=&quot;t&quot;&gt;2:30p&lt;/div&gt;&lt;div class=&quot;dot go&quot;&gt;😴&lt;/div&gt;&lt;div class=&quot;c&quot;&gt;&lt;b&gt;Hotel check-in + recharge.&lt;/b&gt; &lt;span class=&quot;g&quot;&gt;You flew overnight — 60-90 min, but set an alarm so you don&#x27;t crash.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
